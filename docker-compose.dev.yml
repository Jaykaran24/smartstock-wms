version: '3.8'

services:
  # SmartStock WMS Application (Development)
  smartstock-app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: smartstock-wms-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGODB_URI=mongodb://admin:devpassword@mongodb:27017/smartstock-wms?authSource=admin
      - JWT_SECRET=dev-jwt-secret-key-not-for-production
      - JWT_REFRESH_SECRET=dev-refresh-secret-key-not-for-production
      - DEFAULT_ADMIN_PASSWORD=Admin123!
    volumes:
      - .:/app
      - /app/node_modules
      - ./logs:/app/logs
      - ./backups:/app/backups
    networks:
      - smartstock-network
    depends_on:
      - mongodb
    command: npm run dev

  # MongoDB Database for Development
  mongodb:
    image: mongo:7.0
    container_name: smartstock-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=devpassword
      - MONGO_INITDB_DATABASE=smartstock-wms
    volumes:
      - mongodb_dev_data:/data/db
    networks:
      - smartstock-network

networks:
  smartstock-network:
    driver: bridge

volumes:
  mongodb_dev_data:
    driver: local
